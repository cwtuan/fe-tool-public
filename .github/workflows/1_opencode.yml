name: opencode

on:
  push:
    branches:
      - master
  workflow_dispatch:

  schedule:
    - cron:  '0 1 1 * *' # Run at 1:00 AM on the first day of every month

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout public repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install opencode-ai
        run: |
          npm i -g opencode-ai


      - name: run opencode-ai
        run: |
          opencode run "1. update src/App.jsx for new react feature demo 2. create a new branch and create a PR"

