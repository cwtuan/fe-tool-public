name: Run Scripts

on:
  # Manual trigger
  workflow_dispatch:

  # Scheduled trigger (uncomment to enable)
  # schedule:
  #   - cron: '0 2 * * *'  # Runs daily at 02:00 UTC

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    
    # Set timeout to prevent hanging scripts
    timeout-minutes: 30

    steps:
      # Step 1: Checkout current public repo (optional, if public repo files needed)
      - name: Checkout public repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Step 2: Clone private repository
      - name: Clone fe-tool
        env:
          # Token passed via environment variable, GitHub auto-masks it in logs
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/cwtuan/fe-tool.git" private-repo  > /dev/null 2>&1
          rm -rf private-repo/.git  > /dev/null 2>&1

      # Step 3: Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Step 4: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: private-repo/pnpm-lock.yaml

      # Step 5: Install dependencies
      - name: Install dependencies
        working-directory: private-repo
        run: pnpm install  > /dev/null 2>&1

      # Step 6: Run deploy
      - name: deploy npm-compare
        working-directory: private-repo
        run: pnpm nx deploy npm-compare

      # Step 7: Cleanup sensitive data
      - name: Cleanup
        if: always()
        run: |
          rm -rf private-repo
